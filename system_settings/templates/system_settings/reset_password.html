<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Reset mật khẩu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
        .topbar { background: #1565C0; color: white; padding: 16px 30px; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 20px; font-weight: 600; }
        .container { padding: 40px 30px; display: flex; justify-content: center; }
        .card {
            background: white; border-radius: 10px; border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 32px; width: 440px;
        }
        .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #E3F2FD; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #1565C0; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
        .card-header h2 { font-size: 16px; font-weight: 600; color: #1565C0; }
        .card-header p  { font-size: 13px; color: #999; margin-top: 2px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }

        .hint { font-size: 12px; color: #999; margin-top: 5px; }
        .error-box { background: #FFEBEE; color: #c62828; border: 1px solid #FFCDD2; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; }

        .form-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .btn { padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-save { background: #1565C0; color: white; }
        .btn-back { background: #e0e0e0; color: #555; }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🔑 Reset mật khẩu</h1>
        <a href="{% url 'system_settings:user_list' %}" class="btn btn-back">← Tài khoản</a>
    </div>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="avatar">{{ target.username|first|upper }}</div>
                <div>
                    <h2>Reset mật khẩu cho {{ target.username }}</h2>
                    <p>Đặt mật khẩu mới — user sẽ dùng mật khẩu này để đăng nhập</p>
                </div>
            </div>

            {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" name="new_password" placeholder="Nhập mật khẩu mới..." autofocus>
                    <div class="hint">Tối thiểu 6 ký tự</div>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" name="new_password2" placeholder="Nhập lại mật khẩu...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-save">🔑 Đặt mật khẩu mới</button>
                    <a href="{% url 'system_settings:user_list' %}" class="btn btn-back">Hủy</a>
                </div>
            </form>
        </div>
    </div>
{% include 'employees/includes/auto_logout.html' %}
</body>
</html>

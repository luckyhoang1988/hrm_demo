<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xóa bộ phận</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card {
            background: white; border-radius: 12px; padding: 36px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 10px; }
        p  { font-size: 14px; color: #777; margin-bottom: 24px; }
        p strong { color: #c62828; }
        .actions { display: flex; gap: 12px; justify-content: center; }
        .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-confirm { background: #c62828; color: white; }
        .btn-back    { background: #e0e0e0; color: #555; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">⚠️</div>
    <h2>Xác nhận xóa bộ phận</h2>
    <p>Bạn có chắc muốn xóa bộ phận <strong>{{ dept.name }}</strong>?<br>Hành động này không thể hoàn tác.</p>
    <div class="actions">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-confirm">Xóa</button>
        </form>
        <a href="{% url 'system_settings:department_manage' %}" class="btn btn-back">Hủy</a>
    </div>
</div>
{% include 'employees/includes/auto_logout.html' %}
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo tài khoản</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }

        .topbar {
            background: #1565C0; color: white;
            padding: 16px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar h1 { font-size: 20px; font-weight: 600; }

        .container { padding: 28px 30px; display: flex; justify-content: center; }

        .form-card {
            background: white; border-radius: 10px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
            padding: 30px; width: 440px;
        }
        .form-card h2 {
            font-size: 16px; font-weight: 600; color: #1565C0;
            margin-bottom: 22px; padding-bottom: 10px;
            border-bottom: 2px solid #E3F2FD;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input[type=text],
        .form-group input[type=email],
        .form-group input[type=password] {
            width: 100%; padding: 9px 12px;
            border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: #1565C0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
        }

        .checkbox-group {
            display: flex; align-items: center; gap: 10px;
            background: #FFF8E1; border: 1px solid #FFE082;
            border-radius: 8px; padding: 12px 14px;
        }
        .checkbox-group input { width: 16px; height: 16px; accent-color: #E65100; }
        .checkbox-group label { font-size: 13px; color: #555; cursor: pointer; margin: 0; }

        .error-box {
            background: #FFEBEE; color: #c62828;
            border: 1px solid #FFCDD2; border-radius: 6px;
            padding: 10px 14px; font-size: 13px; margin-bottom: 18px;
        }

        .form-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 18px; border-top: 1px solid #f0f0f0; }
        .btn { padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-block; }
        .btn-save { background: #1565C0; color: white; }
        .btn-back { background: #e0e0e0; color: #555; }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>Tạo tài khoản mới</h1>
        <a href="{% url 'system_settings:user_list' %}" class="btn btn-back">← Danh sách</a>
    </div>

    <div class="container">
        <div class="form-card">
            <h2>Thông tin tài khoản</h2>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label>Tên đăng nhập *</label>
                    <input type="text" name="username" placeholder="Nhập tên đăng nhập..." autofocus>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="example@company.com">
                </div>

                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu...">
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" name="is_superuser" id="is_superuser">
                        <label for="is_superuser">
                            <strong>Superuser</strong> — có quyền xem tất cả bộ phận và quản lý hệ thống
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-save">Tạo tài khoản</button>
                    <a href="{% url 'system_settings:user_list' %}" class="btn btn-back">Hủy</a>
                </div>
            </form>
        </div>
    </div>
{% include 'employees/includes/auto_logout.html' %}
</body>
</html>

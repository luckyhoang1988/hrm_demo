<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xóa loại nghỉ phép — HRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
.topbar{background:#1565C0;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-size:16px;font-weight:700;text-decoration:none;color:#fff}
.topbar-right a{color:#bbdefb;text-decoration:none;font-size:13px}
.container{max-width:480px;margin:60px auto;padding:0 20px}
.card{background:#fff;border-radius:12px;padding:32px;border:1px solid #e0e0e0;text-align:center}
.card h2{font-size:17px;font-weight:700;color:#c62828;margin-bottom:10px}
.detail{background:#fff3e0;border-radius:8px;padding:10px;margin:14px 0;font-size:13px;color:#e65100}
.actions{display:flex;justify-content:center;gap:12px;margin-top:22px}
.btn{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none}
.btn-danger{background:#c62828;color:#fff}
.btn-cancel{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
</style>
</head>
<body>
<div class="topbar">
  <a class="topbar-brand" href="{% url 'home' %}">🏢 HRM System</a>
  <div class="topbar-right"><a href="{% url 'attendance:leave_type_list' %}">← Quay lại</a></div>
</div>
<div class="container">
  <div class="card">
    <div style="font-size:44px;margin-bottom:14px">🗑</div>
    <h2>Xóa loại nghỉ phép?</h2>
    <div class="detail"><strong>{{ lt.name }}</strong> ({{ lt.code }})</div>
    <p style="color:#c62828;font-size:13px">Hành động này không thể hoàn tác và sẽ ảnh hưởng đến các đơn nghỉ liên quan.</p>
    <div class="actions">
      <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-danger">Xóa</button>
      </form>
      <a href="{% url 'attendance:leave_type_list' %}" class="btn btn-cancel">Hủy</a>
    </div>
  </div>
</div>
{% include 'employees/includes/auto_logout.html' %}
</body>
</html>

upstream django {
    server web:8000;
}

# HTTP — chuyển hướng toàn bộ sang HTTPS
server {
    listen 80;
    server_name ryanapp.online www.ryanapp.online;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ryanapp.online www.ryanapp.online;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/ryanapp.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ryanapp.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

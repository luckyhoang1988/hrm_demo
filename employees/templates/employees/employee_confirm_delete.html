<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận xóa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .box { background-color: #fff3f3; border: 1px solid #f44336; border-radius: 8px; padding: 25px; max-width: 450px; }
        h2 { color: #f44336; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-confirm { background-color: #f44336; color: white; }
        .btn-cancel { background-color: #9e9e9e; color: white; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Xác nhận xóa</h2>
        <p>Bạn có chắc muốn xóa nhân viên <strong>{{ employee.full_name }}</strong> không?</p>
        <p style="color:#999; font-size:13px;">Hành động này không thể hoàn tác.</p>

        <!-- Khi bấm "Xóa", form gửi POST request đến URL hiện tại -->
        <!-- View nhận POST → tiến hành xóa khỏi database -->
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-confirm">Xóa</button>
            <a href="{% url 'employee_list' %}" class="btn btn-cancel">Hủy</a>
        </form>
    </div>

{% include 'employees/includes/auto_logout.html' %}
</body>
</html>

<!-- Modal cảnh báo sắp hết phiên -->
<div id="al-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:99999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:36px 32px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.35);">
        <div style="font-size:52px;margin-bottom:10px;">⏰</div>
        <h3 style="color:#1565C0;margin:0 0 8px;font-size:20px;">Phiên làm việc sắp hết hạn</h3>
        <p style="color:#555;margin:0 0 12px;font-size:14px;">Bạn sẽ bị đăng xuất sau:</p>
        <div id="al-countdown" style="font-size:56px;font-weight:700;color:#c62828;margin:0 0 12px;font-family:monospace;letter-spacing:2px;">2:00</div>
        <p style="color:#888;font-size:13px;margin:0 0 28px;">do không phát hiện hoạt động nào.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button onclick="alReset()" style="background:#1565C0;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;cursor:pointer;font-weight:600;min-width:160px;">
                Tiếp tục làm việc
            </button>
            <button onclick="alLogout()" style="background:#e53935;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;cursor:pointer;font-weight:600;min-width:140px;">
                Đăng xuất ngay
            </button>
        </div>
    </div>
</div>

<!-- Form POST logout (Django 5+ yêu cầu POST, không dùng GET) -->
<form id="al-form" method="post" action="/logout/" style="display:none;">
    {% csrf_token %}
</form>

<script>
(function () {
    // 13 phút không hoạt động → hiện popup, 2 phút đếm ngược → tự logout (tổng 15 phút)
    var IDLE_MS = 13 * 60 * 1000;
    var WARN_SEC = 120;

    var overlay = document.getElementById('al-overlay');
    var countEl = document.getElementById('al-countdown');
    var warnTimer = null;
    var countTimer = null;
    var remaining = WARN_SEC;

    function alLogout() {
        clearTimeout(warnTimer);
        clearInterval(countTimer);
        document.getElementById('al-form').submit();
    }

    function startCountdown() {
        remaining = WARN_SEC;
        overlay.style.display = 'flex';
        clearInterval(countTimer);
        countTimer = setInterval(function () {
            remaining--;
            var m = Math.floor(remaining / 60);
            var s = remaining % 60;
            countEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
            if (remaining <= 0) {
                clearInterval(countTimer);
                alLogout();
            }
        }, 1000);
    }

    function alReset() {
        overlay.style.display = 'none';
        clearTimeout(warnTimer);
        clearInterval(countTimer);
        remaining = WARN_SEC;
        countEl.textContent = '2:00';
        scheduleWarn();
    }

    function scheduleWarn() {
        clearTimeout(warnTimer);
        warnTimer = setTimeout(startCountdown, IDLE_MS);
    }

    // Phát hiện bất kỳ hoạt động nào của người dùng
    ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(function (evt) {
        document.addEventListener(evt, function () {
            // Chỉ reset nếu popup chưa hiện (khi popup đang hiện, user phải bấm nút)
            if (overlay.style.display === 'none') {
                scheduleWarn();
            }
        }, { passive: true });
    });

    // Expose ra ngoài để nút bấm gọi được
    window.alReset = alReset;
    window.alLogout = alLogout;

    // Khởi động
    scheduleWarn();
})();
</script>

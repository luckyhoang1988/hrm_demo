<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1565C0, #42A5F5);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo .icon { font-size: 44px; }
        .logo h2 { font-size: 22px; color: #1565C0; margin-top: 8px; font-weight: 700; }
        .logo p  { font-size: 13px; color: #999; margin-top: 4px; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 13px;
            font-weight: 600; color: #555; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            border: 1px solid #ccc; border-radius: 7px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: #1565C0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
        }
        .btn-login {
            width: 100%; padding: 11px;
            background: #1565C0; color: white;
            border: none; border-radius: 7px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #0D47A1; }
        .error {
            background: #FFEBEE; color: #c62828;
            border: 1px solid #FFCDD2;
            border-radius: 6px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="icon">👥</div>
            <h2>HRM System</h2>
            <p>Hệ thống quản lý nhân viên</p>
        </div>

        {% if form.errors %}
        <div class="error">Tên đăng nhập hoặc mật khẩu không đúng.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" autofocus placeholder="Nhập tên đăng nhập...">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
    </div>
</body>
</html>

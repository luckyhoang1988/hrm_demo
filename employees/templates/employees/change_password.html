<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
        .topbar { background: #1565C0; color: white; padding: 16px 30px; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 20px; font-weight: 600; }
        .container { padding: 40px 30px; display: flex; justify-content: center; }
        .card {
            background: white; border-radius: 10px; border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 32px; width: 440px;
        }
        .card h2 { font-size: 16px; font-weight: 600; color: #1565C0; margin-bottom: 22px; padding-bottom: 10px; border-bottom: 2px solid #E3F2FD; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .form-group input {
            width: 100%; padding: 10px 40px 10px 12px;
            border: 1px solid #ccc; border-radius: 6px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }
        .toggle-eye {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; font-size: 16px; user-select: none; color: #999;
        }
        .hint { font-size: 12px; color: #999; margin-top: 5px; }

        .divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }

        .error-box { background: #FFEBEE; color: #c62828; border: 1px solid #FFCDD2; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; }

        .form-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .btn { padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-save { background: #1565C0; color: white; }
        .btn-back { background: #e0e0e0; color: #555; }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🔒 Đổi mật khẩu</h1>
        <a href="{% url 'employee_list' %}" class="btn btn-back">← Quay lại</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Đổi mật khẩu — {{ request.user.username }}</h2>

            {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Mật khẩu hiện tại</label>
                    <div class="input-wrap">
                        <input type="password" name="old_password" id="old_password" placeholder="Nhập mật khẩu hiện tại..." autofocus>
                        <span class="toggle-eye" onclick="toggleVis('old_password', this)">👁</span>
                    </div>
                </div>

                <hr class="divider">

                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <div class="input-wrap">
                        <input type="password" name="new_password" id="new_password" placeholder="Nhập mật khẩu mới...">
                        <span class="toggle-eye" onclick="toggleVis('new_password', this)">👁</span>
                    </div>
                    <div class="hint">Tối thiểu 6 ký tự</div>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu mới</label>
                    <div class="input-wrap">
                        <input type="password" name="new_password2" id="new_password2" placeholder="Nhập lại mật khẩu mới...">
                        <span class="toggle-eye" onclick="toggleVis('new_password2', this)">👁</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-save">Đổi mật khẩu</button>
                    <a href="{% url 'employee_list' %}" class="btn btn-back">Hủy</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        function toggleVis(id, eye) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                eye.style.opacity = '1';
            } else {
                input.type = 'password';
                eye.style.opacity = '0.5';
            }
        }
    </script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    var e = document.querySelector('.error-box');
    if (e) e.scrollIntoView({ behavior: 'smooth', block: 'center' });
});
</script>
{% include 'employees/includes/auto_logout.html' %}
</body>
</html>
